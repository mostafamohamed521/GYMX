{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --primary: #3B82F6;
      --accent:  #0EA5E9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(150deg, #1E3A8A 0%, #1D4ED8 50%, #0369A1 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Background circles */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .c1 { width: 500px; height: 500px; top: -150px; left: -150px; }
    .c2 { width: 350px; height: 350px; bottom: -100px; right: -100px; }
    .c3 { width: 200px; height: 200px; top: 50%; right: 10%; }

    /* Logo */
    .splash-logo {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: splashIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes splashIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .logo-icon {
      width: 96px; height: 96px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      color: white;
      margin: 0 auto 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo-name {
      font-size: 52px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }
    .logo-tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* Loading bar */
    .loading-bar-wrap {
      position: relative;
      z-index: 1;
      margin-top: 60px;
      width: 200px;
      animation: splashIn 0.8s 0.3s both;
    }
    .loading-bar-bg {
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: white;
      border-radius: 99px;
      width: 0%;
      animation: loadFill 2s 0.5s ease forwards;
    }
    @keyframes loadFill {
      0%   { width: 0%; }
      60%  { width: 70%; }
      100% { width: 100%; }
    }
    .loading-text {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* Bottom version */
    .version {
      position: absolute;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>

  <div class="splash-logo">
    <div class="logo-icon"><i class="fa-solid fa-dumbbell"></i></div>
    <div class="logo-name">GymX</div>
    <div class="logo-tagline">Gym Management System</div>
  </div>

  <div class="loading-bar-wrap">
    <div class="loading-bar-bg">
      <div class="loading-bar-fill" id="loadBar"></div>
    </div>
    <div class="loading-text">Loading...</div>
  </div>

  <div class="version">v1.0.0 &nbsp;&middot;&nbsp; Sprint 1</div>

  <script>
    // Auto-redirect after splash
    setTimeout(() => {
      window.location.href = "{% url 'accounts:welcome' %}";
    }, 2600);
  </script>
</body>
</html>
