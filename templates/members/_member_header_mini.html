{% load static %}
<div style="background:white;border:1px solid var(--border);border-radius:var(--radius-xl);padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-xs);">
  <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;overflow:hidden;flex-shrink:0;">
    {% if member.profile_image %}<img src="{{ member.profile_image.url }}" style="width:100%;height:100%;object-fit:cover;" />{% else %}{{ member.get_initials }}{% endif %}
  </div>
  <div style="flex:1;">
    <span style="font-size:14px;font-weight:700;color:var(--text-primary);">{{ member.get_full_name }}</span>
    <span style="font-size:12px;color:var(--text-muted);margin-left:8px;font-family:monospace;">{{ member.member_id }}</span>
    <span class="badge-gymx {{ member.get_status_color }}" style="margin-left:8px;font-size:10px;">{{ member.get_status_display }}</span>
  </div>
  <a href="{% url 'members:detail' member.pk %}" class="btn-gymx outline" style="font-size:12px;padding:5px 14px;text-decoration:none;">Overview</a>
</div>
